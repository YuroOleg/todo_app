{% extends 'main/base.html' %}

{% block body %}
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-8 col-lg-5">
                <h1 class="my-4 text-center">Are you sure you want to delete this task?</h1>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-around">
                        <button class="btn btn-secondary px-5" href="{% url 'home' %}">Return</button>
                        <button class="btn btn-danger px-5" type = "submit">Delete</button>
                    </div>
                    
                </form>
            </div>
        </div>
    </div>
    
{% endblock %}
